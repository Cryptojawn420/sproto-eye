<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sproto Eye - Mobile Controls Test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      background: #1a1a2e;
      color: white;
      font-family: monospace;
      overflow: hidden;
    }

    #game-area {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
      position: relative;
    }

    #status {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.8);
      padding: 15px;
      border-radius: 8px;
      border: 2px solid #00ff88;
      z-index: 2000;
      font-size: 14px;
      max-width: 300px;
    }

    #status h3 {
      color: #00ff88;
      margin-bottom: 10px;
    }

    .status-line {
      margin: 5px 0;
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }

    .status-label {
      color: #888;
    }

    .status-value {
      color: #00ff88;
      font-weight: bold;
    }

    #test-info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #00aa44;
      font-size: 12px;
      max-width: 250px;
    }

    .test-pass {
      color: #00ff00;
    }

    .test-pending {
      color: #ffaa00;
    }

    @media (max-width: 768px) {
      #status {
        font-size: 12px;
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="game-area"></div>

  <div id="status">
    <h3>📊 Mobile Controls Test</h3>
    <div class="status-line">
      <span class="status-label">Left Joy X:</span>
      <span class="status-value" id="left-x">0.00</span>
    </div>
    <div class="status-line">
      <span class="status-label">Left Joy Y:</span>
      <span class="status-value" id="left-y">0.00</span>
    </div>
    <div class="status-line">
      <span class="status-label">Right Joy X:</span>
      <span class="status-value" id="right-x">0.00</span>
    </div>
    <div class="status-line">
      <span class="status-label">Right Joy Y:</span>
      <span class="status-value" id="right-y">0.00</span>
    </div>
    <div class="status-line">
      <span class="status-label">Fire:</span>
      <span class="status-value" id="fire-status">OFF</span>
    </div>
    <div class="status-line">
      <span class="status-label">Weapon:</span>
      <span class="status-value" id="weapon-status">PISTOL</span>
    </div>
  </div>

  <div id="test-info">
    <strong>Test Checklist:</strong>
    <div id="test-left-joy" class="test-pending">⏳ Left joystick</div>
    <div id="test-right-joy" class="test-pending">⏳ Right joystick</div>
    <div id="test-fire" class="test-pending">⏳ Fire button</div>
    <div id="test-weapons" class="test-pending">⏳ Weapon swap</div>
  </div>

  <script type="module">
    // Inline mobile controls for testing
    class MobileControls {
      constructor(containerElement) {
        this.container = containerElement;
        this.isActive = false;
        this.touchState = {
          leftJoystick: { x: 0, y: 0, active: false },
          rightJoystick: { x: 0, y: 0, active: false },
          firePressed: false,
          weaponSwap: false,
        };

        this.joystickRadius = 50;
        this.deadZone = 0.1;
        this.callbacks = {
          onMove: null,
          onLook: null,
          onFire: null,
          onWeaponSwap: null,
        };
      }

      init() {
        this.createTouchUI();
        this.attachTouchListeners();
        this.isActive = true;
        console.log("✓ Mobile controls initialized");
      }

      createTouchUI() {
        const html = `
          <div id="mobile-controls" style="
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            top: 0;
            pointer-events: none;
            z-index: 1000;
          ">
            <div id="left-joystick-bg" style="
              position: fixed;
              bottom: 40px;
              left: 40px;
              width: 120px;
              height: 120px;
              border-radius: 50%;
              background: rgba(100, 100, 100, 0.3);
              border: 2px solid rgba(255, 255, 255, 0.5);
              pointer-events: auto;
              touch-action: none;
            ">
              <div id="left-joystick-stick" style="
                position: absolute;
                width: 60px;
                height: 60px;
                border-radius: 50%;
                background: rgba(150, 150, 150, 0.6);
                border: 2px solid rgba(255, 255, 255, 0.8);
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                pointer-events: auto;
              "></div>
            </div>

            <div id="right-joystick-bg" style="
              position: fixed;
              bottom: 40px;
              right: 40px;
              width: 120px;
              height: 120px;
              border-radius: 50%;
              background: rgba(100, 100, 100, 0.3);
              border: 2px solid rgba(255, 255, 255, 0.5);
              pointer-events: auto;
              touch-action: none;
            ">
              <div id="right-joystick-stick" style="
                position: absolute;
                width: 60px;
                height: 60px;
                border-radius: 50%;
                background: rgba(150, 150, 150, 0.6);
                border: 2px solid rgba(255, 255, 255, 0.8);
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                pointer-events: auto;
              "></div>
            </div>

            <button id="fire-button" style="
              position: fixed;
              bottom: 50%;
              left: 50%;
              transform: translateX(-50%) translateY(50%);
              width: 80px;
              height: 80px;
              border-radius: 50%;
              background: rgba(255, 50, 50, 0.7);
              border: 3px solid rgba(255, 255, 255, 0.8);
              color: white;
              font-size: 24px;
              font-weight: bold;
              pointer-events: auto;
              touch-action: none;
              cursor: pointer;
              z-index: 1001;
            ">FIRE</button>

            <div id="weapon-swap" style="
              position: fixed;
              top: 20px;
              left: 50%;
              transform: translateX(-50%);
              display: flex;
              gap: 10px;
              pointer-events: auto;
              z-index: 1001;
            ">
              <button id="prev-weapon" style="
                padding: 10px 15px;
                background: rgba(100, 150, 255, 0.7);
                border: 2px solid white;
                color: white;
                border-radius: 5px;
                font-weight: bold;
                cursor: pointer;
                touch-action: none;
              ">← PREV</button>
              <div id="weapon-display" style="
                padding: 10px 15px;
                background: rgba(0, 0, 0, 0.5);
                border: 2px solid white;
                color: white;
                border-radius: 5px;
                font-weight: bold;
                min-width: 80px;
                text-align: center;
              ">PISTOL</div>
              <button id="next-weapon" style="
                padding: 10px 15px;
                background: rgba(100, 150, 255, 0.7);
                border: 2px solid white;
                color: white;
                border-radius: 5px;
                font-weight: bold;
                cursor: pointer;
                touch-action: none;
              ">NEXT →</button>
            </div>
          </div>
        `;

        const controlsContainer = document.createElement("div");
        controlsContainer.innerHTML = html;
        this.container.appendChild(controlsContainer);

        this.leftBg = document.getElementById("left-joystick-bg");
        this.leftStick = document.getElementById("left-joystick-stick");
        this.rightBg = document.getElementById("right-joystick-bg");
        this.rightStick = document.getElementById("right-joystick-stick");
        this.fireBtn = document.getElementById("fire-button");
        this.prevWeapon = document.getElementById("prev-weapon");
        this.nextWeapon = document.getElementById("next-weapon");
        this.weaponDisplay = document.getElementById("weapon-display");
      }

      attachTouchListeners() {
        this.leftBg.addEventListener("touchstart", (e) =>
          this.handleJoystickStart(e, "left")
        );
        this.leftBg.addEventListener("touchmove", (e) =>
          this.handleJoystickMove(e, "left")
        );
        this.leftBg.addEventListener("touchend", (e) =>
          this.handleJoystickEnd(e, "left")
        );

        this.rightBg.addEventListener("touchstart", (e) =>
          this.handleJoystickStart(e, "right")
        );
        this.rightBg.addEventListener("touchmove", (e) =>
          this.handleJoystickMove(e, "right")
        );
        this.rightBg.addEventListener("touchend", (e) =>
          this.handleJoystickEnd(e, "right")
        );

        this.fireBtn.addEventListener("touchstart", () =>
          this.handleFireStart()
        );
        this.fireBtn.addEventListener("touchend", () => this.handleFireEnd());
        this.fireBtn.addEventListener("mousedown", () =>
          this.handleFireStart()
        );
        this.fireBtn.addEventListener("mouseup", () => this.handleFireEnd());

        this.prevWeapon.addEventListener("click", () =>
          this.callbacks.onWeaponSwap && this.callbacks.onWeaponSwap(-1)
        );
        this.nextWeapon.addEventListener("click", () =>
          this.callbacks.onWeaponSwap && this.callbacks.onWeaponSwap(1)
        );
      }

      handleJoystickStart(e, side) {
        e.preventDefault();
        if (side === "left") {
          this.touchState.leftJoystick.active = true;
        } else {
          this.touchState.rightJoystick.active = true;
        }
      }

      handleJoystickMove(e, side) {
        e.preventDefault();
        const touch = e.touches[0];
        const bg = side === "left" ? this.leftBg : this.rightBg;
        const stick = side === "left" ? this.leftStick : this.rightStick;

        const rect = bg.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        const dx = (touch.clientX - centerX) / (rect.width / 2);
        const dy = (touch.clientY - centerY) / (rect.height / 2);

        const distance = Math.sqrt(dx * dx + dy * dy);
        const clamped = Math.min(distance, 1);

        let x = (dx / (distance || 1)) * clamped * this.joystickRadius;
        let y = (dy / (distance || 1)) * clamped * this.joystickRadius;

        stick.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;

        const normalizedDist =
          Math.max(0, clamped - this.deadZone) / (1 - this.deadZone);
        const normalizedX = (dx / (distance || 1)) * normalizedDist;
        const normalizedY = (dy / (distance || 1)) * normalizedDist;

        if (side === "left") {
          this.touchState.leftJoystick.x = normalizedX;
          this.touchState.leftJoystick.y = normalizedY;
          if (this.callbacks.onMove) {
            this.callbacks.onMove(normalizedX, normalizedY);
          }
        } else {
          this.touchState.rightJoystick.x = normalizedX;
          this.touchState.rightJoystick.y = normalizedY;
          if (this.callbacks.onLook) {
            this.callbacks.onLook(normalizedX, normalizedY);
          }
        }
      }

      handleJoystickEnd(e, side) {
        e.preventDefault();
        const stick = side === "left" ? this.leftStick : this.rightStick;
        stick.style.transform = "translate(-50%, -50%)";

        if (side === "left") {
          this.touchState.leftJoystick = { x: 0, y: 0, active: false };
          if (this.callbacks.onMove) {
            this.callbacks.onMove(0, 0);
          }
        } else {
          this.touchState.rightJoystick = { x: 0, y: 0, active: false };
          if (this.callbacks.onLook) {
            this.callbacks.onLook(0, 0);
          }
        }
      }

      handleFireStart() {
        this.touchState.firePressed = true;
        this.fireBtn.style.background = "rgba(255, 100, 100, 0.9)";
        if (this.callbacks.onFire) {
          this.callbacks.onFire(true);
        }
      }

      handleFireEnd() {
        this.touchState.firePressed = false;
        this.fireBtn.style.background = "rgba(255, 50, 50, 0.7)";
        if (this.callbacks.onFire) {
          this.callbacks.onFire(false);
        }
      }

      onMove(callback) {
        this.callbacks.onMove = callback;
      }

      onLook(callback) {
        this.callbacks.onLook = callback;
      }

      onFire(callback) {
        this.callbacks.onFire = callback;
      }

      onWeaponSwap(callback) {
        this.callbacks.onWeaponSwap = callback;
      }
    }

    // Initialize
    const gameArea = document.getElementById("game-area");
    const controls = new MobileControls(gameArea);
    controls.init();

    // Track input
    let leftTouched = false;
    let rightTouched = false;
    let firePressed = false;
    let weaponIndex = 0;
    const weapons = ["PISTOL", "SHOTGUN", "SMG", "ROCKET", "WAND"];

    controls.onMove((x, y) => {
      document.getElementById("left-x").textContent = x.toFixed(2);
      document.getElementById("left-y").textContent = y.toFixed(2);
      if (Math.abs(x) > 0.1 || Math.abs(y) > 0.1) {
        leftTouched = true;
        document.getElementById("test-left-joy").className = "test-pass";
        document.getElementById("test-left-joy").textContent = "✓ Left joystick";
      }
    });

    controls.onLook((x, y) => {
      document.getElementById("right-x").textContent = x.toFixed(2);
      document.getElementById("right-y").textContent = y.toFixed(2);
      if (Math.abs(x) > 0.1 || Math.abs(y) > 0.1) {
        rightTouched = true;
        document.getElementById("test-right-joy").className = "test-pass";
        document.getElementById("test-right-joy").textContent = "✓ Right joystick";
      }
    });

    controls.onFire((pressed) => {
      document.getElementById("fire-status").textContent = pressed ? "ON" : "OFF";
      if (pressed) {
        firePressed = true;
        document.getElementById("test-fire").className = "test-pass";
        document.getElementById("test-fire").textContent = "✓ Fire button";
      }
    });

    controls.onWeaponSwap((direction) => {
      weaponIndex = (weaponIndex + direction + weapons.length) % weapons.length;
      document.getElementById("weapon-status").textContent = weapons[weaponIndex];
      document.getElementById("test-weapons").className = "test-pass";
      document.getElementById("test-weapons").textContent = "✓ Weapon swap";
    });

    console.log("✓ Test page loaded. Try touching the joysticks!");
  </script>
</body>
</html>
